name: CI

on:
  push:
  pull_request:

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            dkms \
            linux-headers-generic \
            sparse \
            shellcheck

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: userspace

      - name: Locate kernel headers and checkpatch
        run: |
          kdir="$(find /usr/src -maxdepth 1 -type d -name 'linux-headers-*-generic' | sort -V | tail -n 1)"
          if [ -z "$kdir" ]; then
            echo "No generic kernel headers found" >&2
            exit 1
          fi

          kver="$(basename "$kdir" | sed 's/^linux-headers-//')"
          {
            echo "KDIR=$kdir"
            echo "KVER=$kver"
          } >> "$GITHUB_ENV"

      - name: Run CI checks
        run: tests/ci.sh

      - name: Run isolated DKMS build
        run: tests/dkms-isolated.sh

  open-issue-on-failure:
    needs: test
    if: ${{ always() && needs.test.result == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Open or update CI failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -eu

          title='[CI] main branch hardening checks failed'
          existing="$(gh issue list \
            --repo "$GH_REPO" \
            --state open \
            --search "$title in:title" \
            --json number \
            --jq '.[0].number // empty')"

          body="$(mktemp)"
          {
            echo "The CI hardening pipeline failed on main."
            echo
            echo "- Run: $RUN_URL"
            echo "- Commit: \`$COMMIT_SHA\`"
            echo
            echo "Checks covered by this pipeline include build smoke tests, parser regression tests, shell/static checks, metadata regression checks, and isolated DKMS build validation."
            echo "The pipeline also covers the Rust userspace mapper with formatting, clippy, unit tests, and bundled profile validation."
            echo
            echo "This issue is created automatically so failures that need attention are tracked. It will be closed automatically after the main branch CI is green again."
          } > "$body"

          gh label create ci \
            --repo "$GH_REPO" \
            --color 0E8A16 \
            --description "Continuous integration" 2>/dev/null || true
          gh label create hardening \
            --repo "$GH_REPO" \
            --color B60205 \
            --description "Security and stability hardening" 2>/dev/null || true

          if [ -n "$existing" ]; then
            gh issue comment "$existing" \
              --repo "$GH_REPO" \
              --body-file "$body"
          else
            gh issue create \
              --repo "$GH_REPO" \
              --title "$title" \
              --body-file "$body" \
              --label ci \
              --label hardening
          fi

  close-issue-on-success:
    needs: test
    if: ${{ always() && needs.test.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Close resolved CI failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -eu

          title='[CI] main branch hardening checks failed'
          existing="$(gh issue list \
            --repo "$GH_REPO" \
            --state open \
            --search "$title in:title" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$existing" ]; then
            gh issue comment "$existing" \
              --repo "$GH_REPO" \
              --body "Main branch CI is green again: $RUN_URL"
            gh issue close "$existing" \
              --repo "$GH_REPO" \
              --reason completed
          fi
